spring.application.name=identity-service

# Puerto para Railway (Configurado a 8080)
server.port=${PORT:8080}

# ===============================
# JWT Configuration
# ===============================
jjwt.secret=${JJWT_SECRET:mySecretKeyWithEnoughLengthForHS256Algorithm123456789}
jjwt.expiration=86400

# ===============================
# R2DBC - PostgreSQL (Railway)
# ===============================
# Importante: Railway inyectará estas variables automáticamente si las vinculas
# spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/biosense}
# spring.r2dbc.username=${SPRING_R2DBC_USERNAME:user}
# spring.r2dbc.password=${SPRING_R2DBC_PASSWORD:password}
spring.r2dbc.url=${SPRING_R2DBC_URL}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD}
spring.r2dbc.properties.driver=postgresql
# ===============================
# Google OAuth2 / Resource Server (Login desde Android)
# ===============================
# El backend usa el Web Client ID para validar los tokens que vienen del móvil
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Para validar el JWT de Google directamente
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# ===============================
# Inicialización de base de datos
# ===============================
# 'always' asegura que las tablas de schema.sql se creen en Railway
spring.sql.init.mode=always

# ===============================
# Actuator (Healthcheck Railway)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ===============================
# Logs (DEBUG para ver fallos de conexión o auth)
# ===============================
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.postgresql=DEBUG
logging.level.org.springframework.security=DEBUG
